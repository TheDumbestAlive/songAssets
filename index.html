<doctype! html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/processing-js@1.6.6/processing.min.js"></script>
  </head>
  
  <body>
    <canvas id = 'DAW'></canvas>
    <script>
      const processing = (p) => {
            p.setup = () = {
                p.width = window.innerWidth;
                p.height = window.innerHeight;
                p.background(0,0,0);
              
            }
        
      };
      let canvas = document.getElementById('DAW');
      let pjs = new Processing(canvas, processing);
      
    </script>
  </body>
</html>
